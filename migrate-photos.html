<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片搬移工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F7F4EF;color:#3D2B1F;padding:24px;max-width:600px;margin:0 auto}
h1{font-size:20px;margin-bottom:6px}
p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;border:1px solid #D4DDD1}
.btn{background:#4A6741;color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:14px;cursor:pointer;width:100%;margin-top:12px;font-family:system-ui}
.btn:hover{background:#3d5535}
.btn:disabled{background:#aaa;cursor:not-allowed}
.btn.done{background:#4CAF50}
.log{background:#1e1e1e;color:#d4d4d4;border-radius:10px;padding:14px;font-size:12px;font-family:monospace;height:320px;overflow-y:auto;margin-top:12px;line-height:1.7}
.log .ok{color:#4CAF50}.log .err{color:#f44336}.log .info{color:#64B5F6}.log .warn{color:#FFB74D}
.progress{height:10px;background:#EDE8DF;border-radius:5px;margin-top:12px;overflow:hidden}
.progress-bar{height:100%;background:#4A6741;border-radius:5px;transition:width .3s;width:0%}
.stat{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.stat-item{background:#EDE8DF;border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:600;color:#4A6741}
.stat-label{font-size:10px;color:#888;margin-top:2px}
</style>
</head>
<body>
<h1>🌿 照片搬移工具</h1>
<p>逐株讀取植物，將 base64 照片搬移到 Firebase Storage。<br>資料量很大時請耐心等待，過程中請勿關閉此頁面。</p>

<div class="card">
  <div style="font-size:14px;font-weight:500;margin-bottom:10px">搬移進度</div>
  <div class="stat">
    <div class="stat-item"><div class="stat-num" id="s-total">-</div><div class="stat-label">總植物數</div></div>
    <div class="stat-item"><div class="stat-num" id="s-done">0</div><div class="stat-label">已完成</div></div>
    <div class="stat-item"><div class="stat-num" id="s-photos">0</div><div class="stat-label">已搬照片</div></div>
    <div class="stat-item"><div class="stat-num" id="s-skip">0</div><div class="stat-label">略過</div></div>
  </div>
  <div class="progress"><div class="progress-bar" id="prog"></div></div>
  <button class="btn" id="start-btn" onclick="startMigration()">開始搬移</button>
</div>

<div class="card">
  <div style="font-size:14px;font-weight:500;margin-bottom:8px">執行記錄</div>
  <div class="log" id="log"><span class="info">準備就緒，按下「開始搬移」</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, get, update, query, orderByKey, limitToFirst, startAfter }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
import { getStorage, ref as sref, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5xA-GEvgLlxBF_jQjO73vPs-D5y1whms",
  authDomain: "plant-manager-7f599.firebaseapp.com",
  databaseURL: "https://plant-manager-7f599-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "plant-manager-7f599",
  storageBucket: "plant-manager-7f599.firebasestorage.app",
  messagingSenderId: "937336218253",
  appId: "1:937336218253:web:eaa987e7523bac08d778c4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

var totalCount = 0, doneCount = 0, photosMoved = 0, skipCount = 0;

function log(msg, type) {
  var el = document.getElementById('log');
  var line = document.createElement('div');
  line.className = type || '';
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  document.getElementById('s-done').textContent = doneCount;
  document.getElementById('s-photos').textContent = photosMoved;
  document.getElementById('s-skip').textContent = skipCount;
  if(totalCount > 0) {
    document.getElementById('prog').style.width = Math.round(doneCount/totalCount*100)+'%';
  }
}

function isBase64(s) { return s && typeof s === 'string' && s.startsWith('data:'); }

function base64ToBlob(dataUrl) {
  try {
    var parts = dataUrl.split(',');
    var mime = parts[0].match(/:(.*?);/)[1];
    var binary = atob(parts[1]);
    var arr = new Uint8Array(binary.length);
    for(var i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
    return new Blob([arr], {type: mime});
  } catch(e) { return null; }
}

async function uploadBase64(plantKey, dataUrl, filename) {
  var blob = base64ToBlob(dataUrl);
  if(!blob) throw new Error('無法解析 base64');
  var path = 'plants/' + plantKey + '/' + filename;
  var snap = await uploadBytes(sref(storage, path), blob);
  return await getDownloadURL(snap.ref);
}

async function migratePlant(key, plant) {
  var updates = {};
  var changed = false;

  // Migrate cover
  if(isBase64(plant.cover)) {
    try {
      var url = await uploadBase64(key, plant.cover, 'cover_' + Date.now() + '.jpg');
      updates.cover = url;
      changed = true;
      photosMoved++;
      log('  ✓ 封面搬移完成', 'ok');
    } catch(e) {
      log('  ✗ 封面失敗: ' + e.message, 'err');
    }
  } else if(plant.cover && plant.cover.startsWith('http')) {
    skipCount++;
  }

  // Migrate photos array
  if(plant.photos && plant.photos.length) {
    var newPhotos = [];
    var photosChanged = false;
    for(var j = 0; j < plant.photos.length; j++) {
      if(isBase64(plant.photos[j])) {
        try {
          var purl = await uploadBase64(key, plant.photos[j], 'photo_' + j + '_' + Date.now() + '.jpg');
          newPhotos.push(purl);
          photosMoved++;
          photosChanged = true;
          log('  ✓ 照片 '+(j+1)+' 搬移完成', 'ok');
        } catch(e) {
          log('  ✗ 照片 '+(j+1)+' 失敗', 'err');
          newPhotos.push(plant.photos[j]);
        }
      } else {
        newPhotos.push(plant.photos[j]);
      }
      await new Promise(r => setTimeout(r, 100));
    }
    if(photosChanged) { updates.photos = newPhotos; changed = true; }
  }

  // Sync cover with first photo if needed
  if(changed && updates.photos && updates.photos.length && !updates.cover && isBase64(plant.cover)) {
    updates.cover = updates.photos[0];
  }

  if(changed) {
    await update(ref(db, 'plants/' + key), updates);
    log('  ✓ 資料庫已更新', 'ok');
  } else {
    log('  → 無 base64 照片，略過', 'info');
  }

  updateStats();
}

window.startMigration = async function() {
  document.getElementById('start-btn').disabled = true;
  document.getElementById('start-btn').textContent = '搬移中...';
  log('開始分批讀取植物資料...', 'info');

  try {
    // First get all keys only (shallow)
    const BATCH = 5;
    var lastKey = null;
    var allKeys = [];

    // Get keys in batches to avoid timeout
    log('讀取植物索引...', 'info');
    var hasMore = true;
    while(hasMore) {
      var q = lastKey
        ? query(ref(db,'plants'), orderByKey(), startAfter(lastKey), limitToFirst(50))
        : query(ref(db,'plants'), orderByKey(), limitToFirst(50));
      var snap = await get(q);
      if(!snap.exists()) { hasMore = false; break; }
      var batch = Object.keys(snap.val());
      allKeys = allKeys.concat(batch);
      lastKey = batch[batch.length-1];
      if(batch.length < 50) hasMore = false;
      log('已讀取 '+allKeys.length+' 筆索引...', 'info');
      await new Promise(r => setTimeout(r, 200));
    }

    totalCount = allKeys.length;
    document.getElementById('s-total').textContent = totalCount;
    log('共找到 '+totalCount+' 株植物，開始逐一搬移...', 'info');

    // Process in batches of BATCH
    for(var i = 0; i < allKeys.length; i += BATCH) {
      var batchKeys = allKeys.slice(i, i + BATCH);
      for(var j = 0; j < batchKeys.length; j++) {
        var key = batchKeys[j];
        try {
          var plantSnap = await get(ref(db, 'plants/'+key));
          if(!plantSnap.exists()) { doneCount++; continue; }
          var plant = plantSnap.val();
          log('處理 ['+(i+j+1)+'/'+totalCount+']: '+(plant.name||key), '');
          await migratePlant(key, plant);
        } catch(e) {
          log('  ✗ 錯誤: '+e.message, 'err');
        }
        doneCount++;
        updateStats();
        await new Promise(r => setTimeout(r, 300));
      }
    }

    log('✅ 全部完成！共搬移 '+photosMoved+' 張照片', 'ok');
    var btn = document.getElementById('start-btn');
    btn.textContent = '✅ 搬移完成';
    btn.classList.add('done');
    btn.disabled = false;

  } catch(e) {
    log('❌ 發生錯誤: '+e.message, 'err');
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = '重新嘗試';
  }
};
</script>
</body>
</html>
