// Fetch one Yahoo Finance price with multiple proxy fallbacks
function fetchOnePrice(sym){
  var base="https://query2.finance.yahoo.com/v8/finance/chart/"+sym+"?interval=1d&range=1d";
  var base2="https://query1.finance.yahoo.com/v8/finance/chart/"+sym+"?interval=1d&range=1d";

  function parseYahoo(data){
    var result=data.chart&&data.chart.result&&data.chart.result[0];
    if(!result)throw new Error("no result");
    var p=result.meta.regularMarketPrice||result.meta.previousClose;
    if(!p)throw new Error("no price");
    return p;
  }

  // Try each proxy in sequence, stop at first success
  function tryList(list){
    if(!list.length)return Promise.reject(new Error("all proxies failed for "+sym));
    var item=list[0],rest=list.slice(1);
    return fetch(item.url,item.opts||{})
      .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
      .then(function(d){ return item.wrap?parseYahoo(JSON.parse(d.contents)):parseYahoo(d); })
      .catch(function(){return tryList(rest);});
  }

  return tryList([
    {url:"https://api.allorigins.win/raw?url="+encodeURIComponent(base)},
    {url:"https://corsproxy.io/?"+encodeURIComponent(base)},
    {url:"https://api.allorigins.win/get?url="+encodeURIComponent(base2),wrap:true},
    {url:"https://corsproxy.io/?"+encodeURIComponent(base2)},
  ]);
}

// US stocks: fetch all in parallel
function fetchPrices(syms){
  var tasks=syms.map(function(sym){
    return fetchOnePrice(sym)
      .then(function(p){return{sym:sym,price:p};})
      .catch(function(){return null;});
  });
  return Promise.all(tasks).then(function(results){
    var prices={};
    results.forEach(function(r){if(r&&r.price)prices[r.sym]=r.price;});
    if(!Object.keys(prices).length)throw new Error("no prices returned");
    return prices;
  });
}

// TW stocks: Yahoo Finance with .TW suffix, keyed by item id
function fetchTWStockPrices(twItems){
  var stocks=twItems.filter(function(x){return x.cat==="台股"&&x.code;});
  if(!stocks.length)return Promise.resolve({});
  var tasks=stocks.map(function(item){
    return fetchOnePrice(item.code+".TW")
      .then(function(p){return{id:item.id,price:p};})
      .catch(function(){return null;});
  });
  return Promise.all(tasks).then(function(results){
    var prices={};
    results.forEach(function(r){if(r&&r.price)prices[r.id]=r.price;});
    return prices;
  });
}

// Fetch fund NAV from 鉅亨 by name
function fetchFundNav(name){
  var url="https://fund.api.cnyes.com/fund/api/v1/funds?search="+encodeURIComponent(name)+"&per_page=5&page=1";
  function parseNav(data){
    var items=(data.data&&data.data.items)||[];
    if(!items.length)throw new Error("not found");
    var exact=items.find(function(f){return (f.name||"").indexOf(name.slice(0,4))>=0;});
    var f=exact||items[0];
    var nav=f.nav||f.price;
    if(!nav)throw new Error("no nav");
    var raw=f.priceDate||"";
    var nd=(""+raw).replace(/^(\d{4})(\d{2})(\d{2})$/,"$1-$2-$3");
    return{nav:nav,date:nd,name:f.name||name};
  }
  return fetch(url,{headers:{Accept:"application/json"}})
    .then(function(r){return r.json();}).then(parseNav)
    .catch(function(){
      var proxy="https://corsproxy.io/?"+encodeURIComponent(url);
      return fetch(proxy).then(function(r){return r.json();}).then(parseNav);
    });
}

// Fund search via 鉅亨網 public API
function apiFundSearch(keyword){
  var url="https://fund.api.cnyes.com/fund/api/v1/funds?search="+encodeURIComponent(keyword)+"&per_page=10&page=1";
  function parseItems(data){
    var items=(data.data&&data.data.items)||[];
    return items.map(function(f){
      var raw=f.priceDate||f.navDate||"";
      var nd=(""+raw).replace(/^(\d{4})(\d{2})(\d{2})$/,"$1-$2-$3");
      return{name:f.name||f.fundName||f.shortName||"",nav:f.nav||f.price||null,navDate:nd,currency:f.currency||"TWD"};
    }).filter(function(f){return f.name;});
  }
  return fetch(url,{headers:{Accept:"application/json"}})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(parseItems)
    .catch(function(){
      var proxy="https://corsproxy.io/?"+encodeURIComponent(url);
      return fetch(proxy).then(function(r){return r.json();}).then(parseItems);
    });
}

// ── chart components ───────────────────────────────────────────────────────
function BarChart(props){
  var bars=props.bars;
  var maxV=Math.max.apply(null,bars.map(function(b){return Math.abs(b.pnl);}));
  if(!maxV)maxV=1;
  return h("div",{style:{display:"flex",alignItems:"flex-end",height:152,gap:1,paddingBottom:24,position:"relative"}},
    bars.map(function(bar,i){
      var pct=Math.max(Math.abs(bar.pnl)/maxV*120,bar.pnl!==0?3:0);
      return h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%",position:"relative"},
        onClick:function(){if(props.onHover)props.onHover(bar.count===0?null:bar);}},
        h("div",{style:{width:"75%",height:pct,background:bar.pnl>0?ACC:bar.pnl<0?RED:DARK,borderRadius:"3px 3px 0 0",transition:"height .4s"}}),
        h("div",{style:{fontSize:9,color:T3,position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",whiteSpace:"nowrap"}},bar.month)
      );
    })
  );
}

function DonutChart(props){
  var slices=props.slices||[];
  var total=slices.reduce(function(a,s){return a+s.value;},0);
  if(!total)return null;
  var r=44,cx=60,cy=60;
  var offset=0;
  return h("svg",{viewBox:"0 0 120 120",width:110,height:110},
    slices.map(function(sl,i){
      var pct=sl.value/total;
      var arc=pct*2*Math.PI;
      var sa=offset-Math.PI/2, ea=sa+arc;
      var x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
      var x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      var d="M "+x1+" "+y1+" A "+r+" "+r+" 0 "+(arc>Math.PI?1:0)+" 1 "+x2+" "+y2;
      offset+=arc;
      return h("path",{key:i,d:d,fill:"none",stroke:PCOLS[i%PCOLS.length],strokeWidth:20});
    })
  );
}
